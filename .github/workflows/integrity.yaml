name: Integrity and Docker check

on:
  push:
    branches: ["main", "develop", "feature/sf-42"]
  pull_request:
    branches: ["main", "develop"]
  
jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t app ./backend

      - name: Create env files from secrets
        run: |
          mkdir -p env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > env/postgres.env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" > env/postgres.env
          echo "POSTGRES_DB=${{ secrets.TEST_DB }}" > env/postgres.env
          echo "DATABASE_URL=${{ secrets.TEST_URL_LOCALHOST_TO_DB }}" | sed 's/@localhost/@db/g' > env/app.env
          echo "TEST_DB_URL=${{ secrets.TEST_URL_LOCALHOST_TO_DB }}" | sed 's/@localhost/@db/g' > env/postgres.env
          echo "TEST_DB=${{ secrets.TEST_DB }}" >> env/postgres.env
          
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> env/app.env
          echo "REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}" > env/app.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > env/app.env
          echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> env/app.env

      - name: Alembic consistency check
        env:
          DATABASE_URL: ${{ secrets.TEST_URL_LOCALHOST_TO_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          TEST_DB_URL: ${{ secrets.TEST_URL_LOCALHOST_TO_DB }}
          POSTGRES_DB: ${{ secrets.TEST_DB }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
        run: |
          docker compose up -d db
          echo "Waiting for Postgres..."
          for i in {1..15}; do
            if docker compose exec -T db pg_isready -U ${{ secrets.POSTGRES_USER }}; then
              echo "Postgres is ready!"
              break
            fi
            echo "Still waiting..."
            sleep 2
          done
          docker compose run --rm -w /app backend alembic upgrade head
      
      - name: Debug Logs
        if: failure()
        run: docker compose logs db

      - name: FastAPI startup check
        env:
          DATABASE_URL: ${{ secrets.TEST_URL_LOCALHOST_TO_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          TEST_DB_URL: ${{ secrets.TEST_URL_LOCALHOST_TO_DB }}
          POSTGRES_DB: ${{ secrets.TEST_DB }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
        run: |
          docker compose up -d backend
          sleep 10
          curl -f http://localhost:8100/healthcheck || (docker compose logs backend && exit 1)
      
      - name: Shutdown
        if: always()
        run: docker compose down
