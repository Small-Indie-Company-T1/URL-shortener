name: Frontend formatting

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  prettier:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Check formatting (PR)
        id: prettier_check
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npx prettier --check .

      - name: Comment on PR if formatting is invalid
        if: github.event_name == 'pull_request' && steps.prettier_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Prettier check failed. Run `npm ci` and `npx prettier --write .` in `frontend`, then push changes."
            })

      - name: Fail PR job if formatting is invalid
        if: github.event_name == 'pull_request' && steps.prettier_check.outcome == 'failure'
        run: exit 1

      - name: Format code (push)
        if: github.event_name == 'push'
        run: npx prettier --write .

      - name: Detect changes
        if: github.event_name == 'push'
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push formatting changes
        if: github.event_name == 'push' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(frontend): auto-format with prettier [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
       
      
