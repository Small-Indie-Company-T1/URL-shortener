[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "Yaloha" }
]
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.18.4",
    "argon2-cffi>=25.1.0",
    "asyncpg>=0.31.0",
    "email-validator>=2.3.0",
    "fastapi>=0.135.2",
    "psycopg2-binary>=2.9.11",
    "pydantic-settings>=2.13.1",
    "python-dotenv>=1.2.2",
    "uvicorn>=0.42.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0", "hatchling"]
build-backend = "hatchling.build"
