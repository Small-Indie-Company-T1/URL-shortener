version: "2"
plugins:
  - name: sqlc-python-asyncpg
    wasm:
      url: https://github.com/tvallotton/sqlc-python-asyncpg/releases/download/v0.1.1/sqlc-python-asyncpg.wasm
      sha256: fbf5851de61000a438300685d3ea09a04cc1ace3d2a1924ef085dd7f91eb3272

sql:
  - schema: "sql/schema.sql"
    queries: "sql/queries"
    engine: "postgresql"
    codegen:
      - plugin: sqlc-python-asyncpg
        out: "src/db"
        options:
          package: "src.db"
          types:
            "pg_catalog.int8":
              python_type: "int"

            "pg_catalog.varchar":
              python_type: "str"

            "pg_catalog.text":
              python_type: "str"

            "pg_catalog.bool":
              python_type: "bool"

            "pg_catalog.timestamptz":
              python_type: "datetime.datetime"
              import: "import datetime"

            "pg_catalog.bytea":
              python_type: "bytes"