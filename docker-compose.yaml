services:
  db:
    image: postgres:17.5-alpine
    env_file:
      - "./env/postgres.env"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/data/postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
