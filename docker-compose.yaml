services:
  db:
    image: postgres:18-alpine
    env_file:
      - "./env/postgres.env"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      - ./backend/tests/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

  backend:
    build:
      context: ./backend
    ports:
      - "8100:8100"
    env_file:
      - "./env/postgres.env"
      - "./env/app.env"
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_MOCKING=disabled
      - VITE_API_BASE_URL=http://localhost:8100
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data:
