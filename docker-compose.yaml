services:
  db:
    image: postgres:18-alpine
    env_file:
      - "./env/postgres.env"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      - ./backend/tests/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 5

  redis: #remember to set password in production
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

  backend:
    build:
      context: ./backend
    ports:
      - "8100:8100" #удалить в проде
    env_file:
      - "./env/postgres.env"
      - "./env/app.env"
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fullstack

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173" #удалить в проде
    environment:
      - VITE_API_MOCKING=disabled
      - VITE_API_BASE_URL=http://localhost:8100
      - VITE_FRONTEND_BASE_URL=http://localhost:5173
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fullstack

  nginx: #при использовании замените в env frontend-а ссылку на бек просто на /api, +запускайте фронт как npm run dev -- --host
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - fullstack

networks:
  fullstack:
    driver: bridge

volumes:
  pg_data:
  redis_data:
