services:
  db:
    image: postgres:18-alpine
    env_file:
      - "./env/postgres.env"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8100:8100"
    env_file:
      - "./env/postgres.env"
      - "./env/app.env"
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pg_data:
