server {
    listen 80;
    server_name localhost;

    location ~ ^/r/(?<short_code>[a-zA-Z0-9]+)$ {
        proxy_pass http://host.docker.internal:8100/redirect/$short_code; # заменить на http://backend:8100/redirect/$short_code в проде
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:8100/; # заменить на http://backend:8100/ в проде
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://host.docker.internal:5173; # заменить на http://frontend:5173 в проде
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}